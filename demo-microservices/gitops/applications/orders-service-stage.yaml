apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: orders-service-stage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/part-of: commerce-platform
    platform.example.io/environment: stage
spec:
  project: platform
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-stage
  sources:
    - repoURL: https://github.com/vorobey5858/devops-project.git
      targetRevision: refs/heads/main
      path: platform-core/templates/service-template
      helm:
        releaseName: orders-service
        valueFiles:
          - $values/platform-core/templates/service-template/values-stage.yaml
          - $values/demo-microservices/services/orders-service/values/common.yaml
          - $values/demo-microservices/services/orders-service/values/stage.yaml
    - repoURL: https://github.com/vorobey5858/devops-project.git
      targetRevision: refs/heads/main
      ref: values
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
