apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-preview-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/part-of: commerce-platform
    platform.example.io/environment: preview
spec:
  project: platform
  source:
    repoURL: https://github.com/vorobey5858/devops-project.git
    targetRevision: refs/heads/main
    path: platform-core/kubernetes/secrets/demo-preview
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-preview
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
