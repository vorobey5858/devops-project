image:
  tag: "0.1.0-stage.2"

replicaCount: 5

podAnnotations:
  platform.example.io/revision-token: "stage-2026-03-17-r1"

resources:
  requests:
    cpu: 300m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 768Mi

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 6

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 6

configmap:
  data:
    LOG_LEVEL: info
    UVICORN_WORKERS: "1"
    UVICORN_KEEPALIVE_TIMEOUT: "20"
    HTTP_TIMEOUT_SECONDS: "5"
    HTTP_MAX_CONNECTIONS: "1024"
    HTTP_MAX_KEEPALIVE_CONNECTIONS: "256"

ingress:
  enabled: true
  hosts:
    - host: api-gateway.stage.platform.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-gateway-stage-tls
      hosts:
        - api-gateway.stage.platform.local
