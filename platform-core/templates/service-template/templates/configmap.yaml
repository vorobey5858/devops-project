{{- if .Values.configmap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "service-template.configmapName" . }}
  labels:
    {{- include "service-template.labels" . | nindent 4 }}
  {{- with .Values.configmap.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- toYaml (default (dict) .Values.configmap.data) | nindent 2 }}
{{- end }}
