apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-services
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: commerce-platform
spec:
  project: platform
  source:
    repoURL: https://github.com/vorobey5858/devops-project.git
    targetRevision: master
    path: demo-microservices/gitops/applications
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
